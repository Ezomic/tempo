name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/tempo
            php artisan down --retry=15
            git fetch origin
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            # Clear stale caches before building: Wayfinder codegen (npm run build)
            # introspects routes, so a stale route cache would omit new routes.
            php artisan optimize:clear
            npm ci
            npm run build
            php artisan migrate --force
            chmod 664 database/database.sqlite database/database.sqlite-wal database/database.sqlite-shm 2>/dev/null || true
            chgrp www-data database/database.sqlite database/database.sqlite-wal database/database.sqlite-shm 2>/dev/null || true
            # setgid on database/ so WAL/SHM files the scheduler (deploy) recreates
            # stay group-writable by PHP-FPM (www-data).
            chmod g+s database
            php artisan optimize
            sudo /bin/systemctl reload php8.4-fpm
            php artisan up
